; PlatformIO Configuration for STM32F411CEU6 Profibus DP Slave
; ============================================================
;
; This allows building and flashing without manually installing
; arm-none-eabi-gcc. PlatformIO handles the toolchain automatically.
;
; Install PlatformIO:
;   pip install platformio
;
; Build:
;   pio run
;
; Flash via ST-Link:
;   pio run --target upload
;
; Flash via DFU (hold BOOT0, press RESET):
;   pio run --target upload --environment blackpill_dfu
;

[env:blackpill_stlink]
platform = ststm32
board = blackpill_f411ce
framework = cmsis
upload_protocol = stlink

; Bare metal build - no HAL, CMSIS headers only
build_flags =
    -std=c99
    -Os
    -Wall -Wextra
    -DSTM32F411xE
    -fdata-sections
    -ffunction-sections
    -fno-common
    -Wl,--gc-sections

; Use our custom linker script
board_build.ldscript = STM32F411CEUx_FLASH.ld

; Source files (in project root, not src/)
build_src_filter =
    +<../main.c>
    +<../i2c.c>
    +<../ssd1306.c>
    +<../stm32f411_startup.s>

[env:blackpill_dfu]
platform = ststm32
board = blackpill_f411ce
framework = cmsis
upload_protocol = dfu

; Bare metal build - no HAL, CMSIS headers only
build_flags =
    -std=c99
    -Os
    -Wall -Wextra
    -DSTM32F411xE
    -fdata-sections
    -ffunction-sections
    -fno-common
    -Wl,--gc-sections

; Use our custom linker script
board_build.ldscript = STM32F411CEUx_FLASH.ld

; Source files (in project root, not src/)
build_src_filter =
    +<../main.c>
    +<../i2c.c>
    +<../ssd1306.c>
    +<../stm32f411_startup.s>
